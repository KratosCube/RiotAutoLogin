name: Patch startup stats refresh once

on:
  push:
    paths:
      - '.github/workflows/patch-startup-stats-refresh-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch startup refresh flow
        shell: pwsh
        run: |
          $path = 'RiotAutoLogin/MainWindow.xaml.cs'
          $text = Get-Content $path -Raw

          $old = @'
            Task preloadTask = GameData.PreloadAllDataAsync();
            await Task.Run(() => MonitorLeagueClientAsync());

            // Deferred API key loading and account update.
'@
          $new = @'
            Task preloadTask = GameData.PreloadAllDataAsync();
            _ = Task.Run(() => MonitorLeagueClientAsync());

            // Deferred API key loading and account update.
'@

          if (!$text.Contains($old)) {
            throw 'Startup monitor block was not found.'
          }

          $text = $text.Replace($old, $new)
          Set-Content -Path $path -Value $text -Encoding UTF8
      - name: Commit patch
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add RiotAutoLogin/MainWindow.xaml.cs
          if (git diff --cached --quiet) {
            Write-Host 'No changes to commit.'
            exit 0
          }
          git commit -m 'Run startup stats refresh after starting league monitor'
          git push


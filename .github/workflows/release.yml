name: Build release executable

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example v1.2.0
        required: true
        default: v1.2.0
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload Windows executable
    runs-on: windows-latest

    env:
      PROJECT_PATH: RiotAutoLogin/RiotAutoLogin.csproj
      PUBLISH_DIR: publish
      ARTIFACT_DIR: artifact

    steps:
      - name: Resolve release tag and version
        id: release_info
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'release') {
            $tag = '${{ github.event.release.tag_name }}'
          } elseif ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
          } else {
            $tag = '${{ github.ref_name }}'
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'Release tag could not be resolved.'
          }

          if (!$tag.StartsWith('v')) {
            $tag = "v$tag"
          }

          $version = $tag.TrimStart('v')
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag: $tag"
          Write-Host "Release version: $version"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        run: dotnet build $env:PROJECT_PATH --configuration Release --no-restore

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish $env:PROJECT_PATH
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output $env:PUBLISH_DIR
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:DebugType=None
          /p:Version=${{ steps.release_info.outputs.version }}
          /p:AssemblyVersion=${{ steps.release_info.outputs.version }}.0
          /p:FileVersion=${{ steps.release_info.outputs.version }}.0

      - name: Prepare release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:ARTIFACT_DIR | Out-Null
          $source = Join-Path $env:PUBLISH_DIR "RiotAutoLogin.exe"
          $assetName = "RiotAutoLogin-${{ steps.release_info.outputs.tag }}-win-x64.exe"
          $destination = Join-Path $env:ARTIFACT_DIR $assetName

          if (!(Test-Path $source)) {
            throw "Published executable was not found at $source"
          }

          Copy-Item $source $destination -Force
          Write-Host "Prepared release asset: $destination"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: RiotAutoLogin ${{ steps.release_info.outputs.tag }}
          generate_release_notes: true
          files: artifact/*.exe
          fail_on_unmatched_files: true

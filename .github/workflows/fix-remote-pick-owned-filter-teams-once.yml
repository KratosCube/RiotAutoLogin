name: Fix Remote Pick team layout once

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Patch Remote Pick team layout
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8-sig')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old[:120]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Model: expose ally/enemy picked champion IDs and champion team side.
          replace('RiotAutoLogin/Models/RemotePickModels.cs',
                  '        public List<int> PickedChampionIds { get; set; } = new();\n        public List<int> AvailableSpellIds { get; set; } = new();',
                  '        public List<int> PickedChampionIds { get; set; } = new();\n        public List<int> AllyPickedChampionIds { get; set; } = new();\n        public List<int> EnemyPickedChampionIds { get; set; } = new();\n        public List<int> AvailableSpellIds { get; set; } = new();')
          replace('RiotAutoLogin/Models/RemotePickModels.cs',
                  '        public bool IsAvailableInCurrentMode { get; set; } = true;\n        public bool IsDisabled =>',
                  '        public bool IsAvailableInCurrentMode { get; set; } = true;\n        public string TeamSide { get; set; } = string.Empty;\n        public bool IsDisabled =>')

          # Server: preserve myTeam/theirTeam side in the state and champion DTOs.
          replace('RiotAutoLogin/Services/RemotePickServerService.cs',
                  '            var pickedChampionIds = new HashSet<int>();\n\n            if (state.IsInChampSelect && LCUService.CheckIfLeagueClientIsOpen())',
                  '            var pickedChampionIds = new HashSet<int>();\n            var allyPickedChampionIds = new HashSet<int>();\n            var enemyPickedChampionIds = new HashSet<int>();\n\n            if (state.IsInChampSelect && LCUService.CheckIfLeagueClientIsOpen())')
          replace('RiotAutoLogin/Services/RemotePickServerService.cs',
                  '                    ParsePicks(doc.RootElement, pickedChampionIds);\n                    state.PickedChampionIds = pickedChampionIds.OrderBy(id => id).ToList();',
                  '                    ParsePicks(doc.RootElement, pickedChampionIds, allyPickedChampionIds, enemyPickedChampionIds);\n                    state.PickedChampionIds = pickedChampionIds.OrderBy(id => id).ToList();\n                    state.AllyPickedChampionIds = allyPickedChampionIds.OrderBy(id => id).ToList();\n                    state.EnemyPickedChampionIds = enemyPickedChampionIds.OrderBy(id => id).ToList();')
          replace('RiotAutoLogin/Services/RemotePickServerService.cs',
                  '                await AddChampionSpellAndRuneListsAsync(state, new HashSet<int>(state.BannedChampionIds), pickedChampionIds);',
                  '                await AddChampionSpellAndRuneListsAsync(state, new HashSet<int>(state.BannedChampionIds), pickedChampionIds, allyPickedChampionIds, enemyPickedChampionIds);')
          replace('RiotAutoLogin/Services/RemotePickServerService.cs',
                  '        private async Task AddChampionSpellAndRuneListsAsync(RemotePickState state, HashSet<int> bannedChampionIds, HashSet<int> pickedChampionIds)',
                  '        private async Task AddChampionSpellAndRuneListsAsync(RemotePickState state, HashSet<int> bannedChampionIds, HashSet<int> pickedChampionIds, HashSet<int> allyPickedChampionIds, HashSet<int> enemyPickedChampionIds)')
          replace('RiotAutoLogin/Services/RemotePickServerService.cs',
                  '                    IsIntent = state.PickIntentChampionId == champion.Id,\n                    IsAvailableInCurrentMode = !shouldFilterRandomChampions || availableChampionIds.Contains(champion.Id) || state.SelectedChampionId == champion.Id || state.PickIntentChampionId == champion.Id',
                  '                    IsIntent = state.PickIntentChampionId == champion.Id,\n                    IsAvailableInCurrentMode = !shouldFilterRandomChampions || availableChampionIds.Contains(champion.Id) || state.SelectedChampionId == champion.Id || state.PickIntentChampionId == champion.Id,\n                    TeamSide = allyPickedChampionIds.Contains(champion.Id) ? "ally" : enemyPickedChampionIds.Contains(champion.Id) ? "enemy" : string.Empty')
          replace('RiotAutoLogin/Services/RemotePickServerService.cs',
                  '        private static void ParsePicks(JsonElement root, HashSet<int> pickedChampionIds)\n        {\n            AddChampionIdsFromTeam(root, "myTeam", pickedChampionIds);\n            AddChampionIdsFromTeam(root, "theirTeam", pickedChampionIds);\n        }',
                  '        private static void ParsePicks(JsonElement root, HashSet<int> pickedChampionIds, HashSet<int> allyPickedChampionIds, HashSet<int> enemyPickedChampionIds)\n        {\n            AddChampionIdsFromTeam(root, "myTeam", pickedChampionIds, allyPickedChampionIds);\n            AddChampionIdsFromTeam(root, "theirTeam", pickedChampionIds, enemyPickedChampionIds);\n        }')
          replace('RiotAutoLogin/Services/RemotePickServerService.cs',
                  '        private static void AddChampionIdsFromTeam(JsonElement root, string propertyName, HashSet<int> championIds)\n        {\n            if (!root.TryGetProperty(propertyName, out JsonElement teamElement) || teamElement.ValueKind != JsonValueKind.Array)\n                return;\n            foreach (JsonElement player in teamElement.EnumerateArray())\n            {\n                if (TryGetPropertyInt(player, "championId", out int championId) && championId > 0) championIds.Add(championId);\n            }\n        }',
                  '        private static void AddChampionIdsFromTeam(JsonElement root, string propertyName, HashSet<int> championIds, HashSet<int>? teamChampionIds = null)\n        {\n            if (!root.TryGetProperty(propertyName, out JsonElement teamElement) || teamElement.ValueKind != JsonValueKind.Array)\n                return;\n            foreach (JsonElement player in teamElement.EnumerateArray())\n            {\n                if (TryGetPropertyInt(player, "championId", out int championId) && championId > 0)\n                {\n                    championIds.Add(championId);\n                    teamChampionIds?.Add(championId);\n                }\n            }\n        }')

          # UI: top labels become bans; left/right side panels become ally/enemy picks.
          replace('RiotAutoLogin/Services/RemotePickPageHtml.cs',
                  '<div class="topbar"><div class="side-title">Ally picks</div><h1>CHOOSE YOUR CHAMPION</h1><div class="side-title right">Enemy picks</div></div>',
                  '<div class="topbar"><div class="side-title">Ally bans</div><h1>CHOOSE YOUR CHAMPION</h1><div class="side-title right">Enemy bans</div></div>')
          replace('RiotAutoLogin/Services/RemotePickPageHtml.cs',
                  '<section class="layout"><aside class="panel side"><h2>Picked</h2><div id="pickedList" class="rail-list"></div></aside><main class="center"><div class="search-wrap"><input id="search" placeholder="Search champion..." autocomplete="off"><div id="count" class="count">0</div></div><div id="champions" class="champion-grid"></div></main><aside class="panel side"><h2>Banned</h2><div id="bannedList" class="rail-list"></div><div id="desktopLoadout" class="loadout"></div></aside></section>',
                  '<section class="layout"><aside class="panel side"><h2>Ally Picks</h2><div id="allyPickedList" class="rail-list"></div></aside><main class="center"><div class="search-wrap"><input id="search" placeholder="Search champion..." autocomplete="off"><div id="count" class="count">0</div></div><div id="champions" class="champion-grid"></div></main><aside class="panel side"><h2>Enemy Picks</h2><div id="enemyPickedList" class="rail-list"></div><div id="desktopLoadout" class="loadout"></div></aside></section>')
          replace('RiotAutoLogin/Services/RemotePickPageHtml.cs',
                  'const championsEl=document.getElementById(\'champions\'), pickedListEl=document.getElementById(\'pickedList\'), bannedListEl=document.getElementById(\'bannedList\'),',
                  'const championsEl=document.getElementById(\'champions\'), allyPickedListEl=document.getElementById(\'allyPickedList\'), enemyPickedListEl=document.getElementById(\'enemyPickedList\'),')
          replace('RiotAutoLogin/Services/RemotePickPageHtml.cs',
                  'function renderAll(){if(!state)return;updateStatusOnly();renderLoadout(desktopLoadoutEl);renderLoadout(mobileLoadoutEl);renderChampionGrid();renderRail(pickedListEl,(state.champions||[]).filter(c=>c.isPicked),\'Picked\');renderRail(bannedListEl,(state.champions||[]).filter(c=>c.isBanned),\'Banned\',true);}',
                  'function renderAll(){if(!state)return;updateStatusOnly();renderLoadout(desktopLoadoutEl);renderLoadout(mobileLoadoutEl);renderChampionGrid();const picked=state.champions||[];renderRail(allyPickedListEl,picked.filter(c=>c.isPicked&&(c.teamSide===\'ally\'||!c.teamSide)),\'Ally Pick\');renderRail(enemyPickedListEl,picked.filter(c=>c.isPicked&&c.teamSide===\'enemy\'),\'Enemy Pick\');}')

          # Keep top ban labels for desktop; mobile keeps side panels hidden as before.
          workflow = Path('.github/workflows/fix-remote-pick-owned-filter-teams-once.yml')
          workflow.unlink(missing_ok=True)

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add RiotAutoLogin/Models/RemotePickModels.cs RiotAutoLogin/Services/RemotePickServerService.cs RiotAutoLogin/Services/RemotePickPageHtml.cs .github/workflows/fix-remote-pick-owned-filter-teams-once.yml
          git commit -m "Split Remote Pick team panels"
          git pull --rebase origin master
          git push origin HEAD:master

name: Fix Remote Pick owned filter and teams once

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Patch Remote Pick champion filtering and team rails
        shell: python
        run: |
          from pathlib import Path

          def p(name): return Path(name)
          def rw(name, old, new):
              path=p(name); text=path.read_text(encoding='utf-8-sig'); text=text.replace(old,new); path.write_text(text,encoding='utf-8')

          p('RiotAutoLogin/Models/RemotePickModels.cs').write_text('''using System.Collections.Generic;

namespace RiotAutoLogin.Models
{
    public class RemotePickState
    {
        public string Phase { get; set; } = "None";
        public string ChampSelectPhase { get; set; } = string.Empty;
        public string PhaseLabel { get; set; } = "Waiting";
        public int TimeLeftInPhaseMs { get; set; } = -1;
        public int TotalTimeInPhaseMs { get; set; } = -1;
        public bool IsTimerInfinite { get; set; }
        public bool IsInChampSelect { get; set; }
        public bool IsMyTurn { get; set; }
        public bool CanPick => IsMyTurn && ActionType == "pick";
        public bool CanBan => IsMyTurn && ActionType == "ban";
        public bool IsBanPhase { get; set; }
        public bool CanLeave { get; set; }
        public string ActionId { get; set; } = string.Empty;
        public string ActionType { get; set; } = string.Empty;
        public string PickActionId { get; set; } = string.Empty;
        public int ActionGroupIndex { get; set; } = -1;
        public string TimerActionKey { get; set; } = string.Empty;
        public string AssignedPosition { get; set; } = string.Empty;
        public int MapId { get; set; }
        public int QueueId { get; set; }
        public string QueueName { get; set; } = string.Empty;
        public string ChampSelectMode { get; set; } = string.Empty;
        public bool IsRandomChampionMode { get; set; }
        public bool IsGameClientRunning { get; set; }
        public bool IsGameLoaded { get; set; }
        public double GameTimeSeconds { get; set; } = -1;
        public string GameStatus { get; set; } = "Waiting";
        public string Message { get; set; } = string.Empty;
        public int SelectedChampionId { get; set; }
        public int PickIntentChampionId { get; set; }
        public int Spell1Id { get; set; }
        public int Spell2Id { get; set; }
        public List<int> BannedChampionIds { get; set; } = new();
        public List<int> PickedChampionIds { get; set; } = new();
        public List<int> AllyPickedChampionIds { get; set; } = new();
        public List<int> EnemyPickedChampionIds { get; set; } = new();
        public List<int> AvailableSpellIds { get; set; } = new();
        public List<int> AvailableChampionIds { get; set; } = new();
        public List<RemoteChampionDto> Champions { get; set; } = new();
        public List<RemoteSummonerSpellDto> SummonerSpells { get; set; } = new();
        public List<RemoteRunePageDto> RunePages { get; set; } = new();
        public List<RemoteRecommendedRunePageDto> RecommendedRunePages { get; set; } = new();
        public RemoteRunePageDto? CurrentRunePage { get; set; }
    }

    public class RemoteChampionDto
    {
        public int Id { get; set; }
        public string Name { get; set; } = string.Empty;
        public string ImageUrl { get; set; } = string.Empty;
        public bool IsBanned { get; set; }
        public bool IsPicked { get; set; }
        public bool IsSelected { get; set; }
        public bool IsIntent { get; set; }
        public bool IsAvailableInCurrentMode { get; set; } = true;
        public string TeamSide { get; set; } = string.Empty;
        public bool IsDisabled => IsBanned || IsPicked || !IsAvailableInCurrentMode;
    }

    public class RemoteSummonerSpellDto { public int Id { get; set; } public string Name { get; set; } = string.Empty; public string Description { get; set; } = string.Empty; public string ImageUrl { get; set; } = string.Empty; public bool IsSpell1 { get; set; } public bool IsSpell2 { get; set; } public bool IsAvailable { get; set; } = true; }
    public class RemoteRunePageDto { public long Id { get; set; } public string Name { get; set; } = string.Empty; public bool IsCurrent { get; set; } public bool IsEditable { get; set; } public bool IsDeletable { get; set; } }
    public class RemoteRecommendedRunePageDto { public int Index { get; set; } public string Name { get; set; } = string.Empty; public string Subtitle { get; set; } = string.Empty; public int PrimaryStyleId { get; set; } public int SubStyleId { get; set; } public List<int> SelectedPerkIds { get; set; } = new(); public bool CanApply => PrimaryStyleId > 0 && SubStyleId > 0 && SelectedPerkIds.Count > 0; }
    public class RemotePickRequest { public int ChampionId { get; set; } }
    public class RemoteSpellRequest { public int SpellId { get; set; } public int Slot { get; set; } }
    public class RemoteRunePageRequest { public long PageId { get; set; } }
    public class RemoteRecommendedRunePageRequest { public int Index { get; set; } }
    public class RemotePickActionResult { public bool Success { get; set; } public string Message { get; set; } = string.Empty; }
}
''', encoding='utf-8')

          av=p('RiotAutoLogin/Services/RemoteChampionAvailabilityService.cs'); t=av.read_text(encoding='utf-8-sig')
          if 'public static HashSet<int> GetOwnedOrFreeChampionIds()' not in t:
              t=t.replace('''        private static void RefreshIfNeeded()''','''        public static HashSet<int> GetOwnedOrFreeChampionIds()
        {
            try
            {
                RefreshIfNeeded();
                lock (_lock)
                {
                    return new HashSet<int>(_ownedOrFreeChampionIds);
                }
            }
            catch (Exception ex)
            {
                Debug.WriteLine($"Could not resolve owned/free champion ids: {ex.Message}");
                return new HashSet<int>();
            }
        }

        private static void RefreshIfNeeded()''')
          av.write_text(t,encoding='utf-8')

          rw('RiotAutoLogin/Services/DataDragonService.cs', '''                // Ban phase must allow banning every champion. Outside ban phase, prefer the LCU
                // owned/free list so Remote Pick does not offer champions the player cannot pick.
                if (!IsCurrentChampSelectBanPhase())
                {
                    var ownedChampions = GetOwnedOrFreeChampionsFromLeagueClient();
                    if (ownedChampions.Count > 0)
                    {
                        Debug.WriteLine($"Loaded {ownedChampions.Count} owned/free champions from LCU");
                        return ownedChampions;
                    }
                }

''', '''                // Keep Data Dragon as an unfiltered champion source.
                // Remote Pick applies owned/free filtering dynamically by champ-select phase.

''')

          s=p('RiotAutoLogin/Services/RemotePickServerService.cs'); t=s.read_text(encoding='utf-8-sig')
          t=t.replace('''            var pickedChampionIds = new HashSet<int>();
''','''            var pickedChampionIds = new HashSet<int>();
            var allyPickedChampionIds = new HashSet<int>();
            var enemyPickedChampionIds = new HashSet<int>();
''',1)
          t=t.replace('''                    ParsePicks(doc.RootElement, pickedChampionIds);
                    state.PickedChampionIds = pickedChampionIds.OrderBy(id => id).ToList();
''','''                    ParsePicks(doc.RootElement, pickedChampionIds, allyPickedChampionIds, enemyPickedChampionIds);
                    state.PickedChampionIds = pickedChampionIds.OrderBy(id => id).ToList();
                    state.AllyPickedChampionIds = allyPickedChampionIds.OrderBy(id => id).ToList();
                    state.EnemyPickedChampionIds = enemyPickedChampionIds.OrderBy(id => id).ToList();
''')
          t=t.replace('''                await AddChampionSpellAndRuneListsAsync(state, new HashSet<int>(state.BannedChampionIds), pickedChampionIds);
''','''                await AddChampionSpellAndRuneListsAsync(state, new HashSet<int>(state.BannedChampionIds), pickedChampionIds, allyPickedChampionIds, enemyPickedChampionIds);
''')
          t=t.replace('''        private async Task AddChampionSpellAndRuneListsAsync(RemotePickState state, HashSet<int> bannedChampionIds, HashSet<int> pickedChampionIds)
        {
            await EnsureRemoteChampionCacheAsync();
            await EnsureRemoteSpellCacheAsync();

            var availableChampionIds = new HashSet<int>(state.AvailableChampionIds);
            bool shouldFilterRandomChampions = state.IsRandomChampionMode && availableChampionIds.Count > 0;

            state.Champions = (_remoteChampionCache ?? new List<RemoteChampionDto>())
                .Where(champion => !shouldFilterRandomChampions || availableChampionIds.Contains(champion.Id) || state.SelectedChampionId == champion.Id || state.PickIntentChampionId == champion.Id || pickedChampionIds.Contains(champion.Id))
                .Select(champion => new RemoteChampionDto
                {
                    Id = champion.Id,
                    Name = champion.Name,
                    ImageUrl = champion.ImageUrl,
                    IsBanned = bannedChampionIds.Contains(champion.Id),
                    IsPicked = pickedChampionIds.Contains(champion.Id),
                    IsSelected = state.SelectedChampionId == champion.Id,
                    IsIntent = state.PickIntentChampionId == champion.Id,
                    IsAvailableInCurrentMode = !shouldFilterRandomChampions || availableChampionIds.Contains(champion.Id) || state.SelectedChampionId == champion.Id || state.PickIntentChampionId == champion.Id
                })
                .ToList();
''','''        private async Task AddChampionSpellAndRuneListsAsync(RemotePickState state, HashSet<int> bannedChampionIds, HashSet<int> pickedChampionIds, HashSet<int> allyPickedChampionIds, HashSet<int> enemyPickedChampionIds)
        {
            await EnsureRemoteChampionCacheAsync();
            await EnsureRemoteSpellCacheAsync();

            var availableChampionIds = new HashSet<int>(state.AvailableChampionIds);
            HashSet<int> ownedOrFreeChampionIds = RemoteChampionAvailabilityService.GetOwnedOrFreeChampionIds();
            bool shouldFilterRandomChampions = state.IsRandomChampionMode && availableChampionIds.Count > 0;
            bool shouldFilterOwnedChampions = !state.IsBanPhase && ownedOrFreeChampionIds.Count > 0;

            bool IsAlwaysVisible(RemoteChampionDto champion) => state.SelectedChampionId == champion.Id || state.PickIntentChampionId == champion.Id || pickedChampionIds.Contains(champion.Id) || bannedChampionIds.Contains(champion.Id);
            bool IsRandomAvailable(RemoteChampionDto champion) => !shouldFilterRandomChampions || availableChampionIds.Contains(champion.Id) || IsAlwaysVisible(champion);
            bool IsOwnedAvailable(RemoteChampionDto champion) => !shouldFilterOwnedChampions || ownedOrFreeChampionIds.Contains(champion.Id) || IsAlwaysVisible(champion);

            state.Champions = (_remoteChampionCache ?? new List<RemoteChampionDto>())
                .Where(champion => IsRandomAvailable(champion) && IsOwnedAvailable(champion))
                .Select(champion => new RemoteChampionDto
                {
                    Id = champion.Id,
                    Name = champion.Name,
                    ImageUrl = champion.ImageUrl,
                    IsBanned = bannedChampionIds.Contains(champion.Id),
                    IsPicked = pickedChampionIds.Contains(champion.Id),
                    IsSelected = state.SelectedChampionId == champion.Id,
                    IsIntent = state.PickIntentChampionId == champion.Id,
                    IsAvailableInCurrentMode = IsRandomAvailable(champion),
                    TeamSide = allyPickedChampionIds.Contains(champion.Id) ? "ally" : enemyPickedChampionIds.Contains(champion.Id) ? "enemy" : string.Empty
                })
                .ToList();
''')
          t=t.replace('''        private static void ParsePicks(JsonElement root, HashSet<int> pickedChampionIds)
        {
            AddChampionIdsFromTeam(root, "myTeam", pickedChampionIds);
            AddChampionIdsFromTeam(root, "theirTeam", pickedChampionIds);
        }
''','''        private static void ParsePicks(JsonElement root, HashSet<int> pickedChampionIds, HashSet<int> allyPickedChampionIds, HashSet<int> enemyPickedChampionIds)
        {
            AddChampionIdsFromTeam(root, "myTeam", pickedChampionIds, allyPickedChampionIds);
            AddChampionIdsFromTeam(root, "theirTeam", pickedChampionIds, enemyPickedChampionIds);
        }
''')
          t=t.replace('''                    if (inProgress)
                    {
                        activeIds.Add(actionId);
                        if (string.IsNullOrWhiteSpace(activeType)) activeType = actionType;
                    }
''','''                    if (inProgress)
                    {
                        activeIds.Add(actionId);
                        if (string.IsNullOrWhiteSpace(activeType)) activeType = actionType;
                        if (actionType == "ban") state.IsBanPhase = true;
                    }
''')
          t=t.replace('''        private static void AddChampionIdsFromTeam(JsonElement root, string propertyName, HashSet<int> championIds)
        {
            if (!root.TryGetProperty(propertyName, out JsonElement teamElement) || teamElement.ValueKind != JsonValueKind.Array)
                return;
            foreach (JsonElement player in teamElement.EnumerateArray())
            {
                if (TryGetPropertyInt(player, "championId", out int championId) && championId > 0) championIds.Add(championId);
            }
        }
''','''        private static void AddChampionIdsFromTeam(JsonElement root, string propertyName, HashSet<int> championIds, HashSet<int>? teamChampionIds = null)
        {
            if (!root.TryGetProperty(propertyName, out JsonElement teamElement) || teamElement.ValueKind != JsonValueKind.Array)
                return;
            foreach (JsonElement player in teamElement.EnumerateArray())
            {
                if (TryGetPropertyInt(player, "championId", out int championId) && championId > 0)
                {
                    championIds.Add(championId);
                    teamChampionIds?.Add(championId);
                }
            }
        }
''')
          s.write_text(t,encoding='utf-8')

          h=p('RiotAutoLogin/Services/RemotePickPageHtml.cs'); t=h.read_text(encoding='utf-8-sig')
          t=t.replace('''.mini-card.banned img { filter:grayscale(1) brightness(.6); border-color:rgba(182,74,85,.8); }''','''.mini-card.banned img { filter:grayscale(1) brightness(.6); border-color:rgba(182,74,85,.8); }
    .team-section { padding:9px 10px; border-bottom:1px solid rgba(200,170,110,.14); }
    .team-section:last-child { border-bottom:0; }
    .team-title { margin:0 0 8px; color:var(--gold); font:900 10px system-ui,sans-serif; text-transform:uppercase; letter-spacing:.16em; }
    .team-title.ally { color:#d7fffb; }
    .team-title.enemy { color:#ffced5; }
    .rail-list.compact { padding:0; }
    .rail-empty.compact { padding:4px 0 2px; }
    .mini-card.ally { border-color:rgba(10,200,185,.28); background:rgba(10,200,185,.055); }

    .mini-card.enemy img { border-color:rgba(182,74,85,.78); }
    .mini-card.intent { box-shadow:inset 3px 0 0 rgba(10,200,185,.75); }''')
          t=t.replace('''<aside class="panel side"><h2>Picked</h2><div id="pickedList" class="rail-list"></div></aside>''','''<aside class="panel side"><h2>Teams</h2><div id="pickedList"></div></aside>''')
          t=t.replace('''function renderAll(){if(!state)return;updateStatusOnly();renderLoadout(desktopLoadoutEl);renderLoadout(mobileLoadoutEl);renderChampionGrid();renderRail(pickedListEl,(state.champions||[]).filter(c=>c.isPicked),'Picked');renderRail(bannedListEl,(state.champions||[]).filter(c=>c.isBanned),'Banned',true);}''','''function renderAll(){if(!state)return;updateStatusOnly();renderLoadout(desktopLoadoutEl);renderLoadout(mobileLoadoutEl);renderChampionGrid();renderTeamRail(pickedListEl,state.champions||[]);renderRail(bannedListEl,(state.champions||[]).filter(c=>c.isBanned),'Banned',true);}''')
          t=t.replace('''function renderRail(el,champions,label,banned=false){el.innerHTML='';if(!champions.length){el.innerHTML=`<div class="rail-empty">No ${label.toLowerCase()} champions yet.</div>`;return;}for(const c of champions.slice(0,10)){const row=document.createElement('div');row.className='mini-card'+(banned?' banned':'');row.innerHTML=`<img src="${escapeAttr(c.imageUrl)}" alt=""><div><div class="name">${escapeHtml(c.name)}</div><div class="sub">${label}</div></div>`;el.appendChild(row);}}''','''function renderTeamRail(el,champions){el.innerHTML='';const ally=dedupeTeam(champions.filter(c=>c.teamSide==='ally'||c.isSelected||c.isIntent));const enemy=dedupeTeam(champions.filter(c=>c.teamSide==='enemy'));const section=(title,list,cls,empty)=>{const s=document.createElement('div');s.className='team-section';s.innerHTML=`<div class="team-title ${cls}">${title}</div>`;if(!list.length){s.innerHTML+=`<div class="rail-empty compact">${empty}</div>`;}else{const wrap=document.createElement('div');wrap.className='rail-list compact';for(const c of list.slice(0,5)){const row=document.createElement('div');row.className=`mini-card ${cls}${c.isIntent?' intent':''}`;row.innerHTML=`<img src="${escapeAttr(c.imageUrl)}" alt=""><div><div class="name">${escapeHtml(c.name)}</div><div class="sub">${c.isIntent?'Intent':title}</div></div>`;wrap.appendChild(row);}s.appendChild(wrap);}el.appendChild(s);};section('Your team',ally,'ally','No ally picks yet.');section('Enemy team',enemy,'enemy','No enemy picks yet.');}
function dedupeTeam(list){const seen=new Set();return list.filter(c=>{const key=(c.teamSide||'')+'|'+c.id;if(seen.has(key))return false;seen.add(key);return true;});}
function renderRail(el,champions,label,banned=false){el.innerHTML='';if(!champions.length){el.innerHTML=`<div class="rail-empty">No ${label.toLowerCase()} champions yet.</div>`;return;}for(const c of champions.slice(0,10)){const row=document.createElement('div');row.className='mini-card'+(banned?' banned':'');row.innerHTML=`<img src="${escapeAttr(c.imageUrl)}" alt=""><div><div class="name">${escapeHtml(c.name)}</div><div class="sub">${label}</div></div>`;el.appendChild(row);}}''')
          t=t.replace('''function renderChampionGrid(){if(!state)return;const champions=state.champions||[];const filtered=champions.filter(c=>c.name.toLowerCase().includes(query));''','''function renderChampionGrid(){if(!state)return;const champions=(state.champions||[]).filter(c=>!c.isPicked&&!c.isBanned);const filtered=champions.filter(c=>c.name.toLowerCase().includes(query));''')
          h.write_text(t,encoding='utf-8')

          p('.github/workflows/fix-remote-pick-owned-filter-teams-once.yml').unlink(missing_ok=True)
          p('.github/remote-pick-owned-filter-trigger.txt').unlink(missing_ok=True)

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if git diff --quiet && git diff --cached --quiet; then echo "No changes to commit."; exit 0; fi
          git add RiotAutoLogin/Models/RemotePickModels.cs RiotAutoLogin/Services/RemoteChampionAvailabilityService.cs RiotAutoLogin/Services/DataDragonService.cs RiotAutoLogin/Services/RemotePickServerService.cs RiotAutoLogin/Services/RemotePickPageHtml.cs .github/workflows/fix-remote-pick-owned-filter-teams-once.yml .github/remote-pick-owned-filter-trigger.txt
          git commit -m "Fix Remote Pick champion filtering and team rails"
          git pull --rebase origin master
          git push origin HEAD:master

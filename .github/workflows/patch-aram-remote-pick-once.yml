name: Patch ARAM Remote Pick once

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Patch ARAM Remote Pick support
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8-sig')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old[:120]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace(
              'RiotAutoLogin/Models/RemotePickModels.cs',
              '        public bool CanPick => IsMyTurn && ActionType == "pick";',
              '        public bool CanPick => (IsMyTurn && ActionType == "pick") || (IsInChampSelect && IsRandomChampionMode);'
          )

          replace(
              'RiotAutoLogin/Services/LCUService.cs',
              '''        public static bool SelectChampion(int championId, string actId, bool complete = false)
        {
            try
            {
                var body = JsonSerializer.Serialize(new { championId, completed = complete });
                var result = ClientRequest("PATCH", $"lol-champ-select/v1/session/actions/{actId}", body);
                return result[0].StartsWith("2");
            }
            catch (Exception ex)
            {
                Debug.WriteLine($"Error selecting champion: {ex.Message}");
                return false;
            }
        }''',
              '''        public static bool SelectChampion(int championId, string actId, bool complete = false)
        {
            try
            {
                if (!string.IsNullOrWhiteSpace(actId))
                {
                    var body = JsonSerializer.Serialize(new { championId, completed = complete });
                    var result = ClientRequest("PATCH", $"lol-champ-select/v1/session/actions/{actId}", body);
                    if (result[0].StartsWith("2"))
                        return true;
                }

                // ARAM/random modes do not always expose a normal pick action.
                // Bench champions are selected through the bench swap endpoint instead.
                var swapResult = ClientRequest("POST", $"lol-champ-select/v1/session/bench/swap/{championId}");
                return swapResult[0].StartsWith("2");
            }
            catch (Exception ex)
            {
                Debug.WriteLine($"Error selecting champion: {ex.Message}");
                return false;
            }
        }'''
          )

          Path('.github/workflows/patch-aram-remote-pick-once.yml').unlink(missing_ok=True)
          Path('.github/aram-remote-pick-run.txt').unlink(missing_ok=True)

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if git diff --quiet && git diff --cached --quiet; then echo "No changes to commit."; exit 0; fi
          git add RiotAutoLogin/Models/RemotePickModels.cs RiotAutoLogin/Services/LCUService.cs .github/workflows/patch-aram-remote-pick-once.yml .github/aram-remote-pick-run.txt
          git commit -m "Support ARAM champion swaps in Remote Pick"
          git pull --rebase origin master
          git push origin HEAD:master

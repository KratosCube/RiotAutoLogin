name: Patch Remote Pick mobile layout once

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Patch mobile Remote Pick UI
        shell: python
        run: |
          from pathlib import Path

          path = Path('RiotAutoLogin/Services/RemotePickPageHtml.cs')
          text = path.read_text(encoding='utf-8-sig')

          def rep(old, new):
              global text
              if old not in text:
                  raise SystemExit('Pattern not found: ' + old[:140])
              text = text.replace(old, new, 1)

          rep("""    .toast { position:fixed; left:12px; right:12px; bottom:12px; z-index:40; padding:13px 15px; border:1px solid rgba(200,170,110,.42); background:rgba(7,13,21,.97); color:var(--text); box-shadow:0 16px 40px rgba(0,0,0,.45); display:none; font:14px system-ui,sans-serif; }""", """    .mobile-action-bar { display:none; }
    .champion.selected-card { border-color:var(--cyan); box-shadow:0 0 0 1px rgba(10,200,185,.55),0 0 24px rgba(10,200,185,.16); }
    .toast { position:fixed; left:12px; right:12px; bottom:12px; z-index:40; padding:13px 15px; border:1px solid rgba(200,170,110,.42); background:rgba(7,13,21,.97); color:var(--text); box-shadow:0 16px 40px rgba(0,0,0,.45); display:none; font:14px system-ui,sans-serif; }""")
          rep("""    @media (max-width:900px) { .app{padding:8px;padding-bottom:96px}.sticky-status{margin:-8px -8px 8px;padding:8px}.topbar{grid-template-columns:1fr;margin-bottom:7px}.side-title{display:none}h1{font-size:20px}.phase-main{padding:9px}.message{font-size:13px;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.timer-box{min-width:76px;padding:7px}.timer-value{font-size:25px}.timer-value.game{font-size:18px}.layout{grid-template-columns:1fr;gap:8px}.panel.side{display:none}.mobile-loadout{display:block;margin-bottom:9px}.search-wrap{grid-template-columns:1fr 54px;position:sticky;top:151px;z-index:8;background:rgba(3,7,13,.92);padding-bottom:8px}.champion-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.champion{min-height:162px}.portrait{height:82px}.champion-name{font-size:10px;padding:7px 6px}.champion-actions{gap:5px;padding:0 5px 6px}.champion-actions button{min-height:32px;font-size:9px;letter-spacing:.04em}.spell-grid{grid-template-columns:1fr 1fr} }""", """    @media (max-width:900px) { .app{padding:8px;padding-bottom:142px}.sticky-status{margin:-8px -8px 8px;padding:7px 8px}.topbar{display:none}.phase-dock{grid-template-columns:minmax(0,1fr) 76px}.phase-main{padding:8px}.phase{font-size:10px;letter-spacing:.11em}.message{margin-top:3px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.status-actions{margin-top:6px;gap:5px;flex-wrap:nowrap;overflow:hidden}.turn-pill{padding:5px 7px;font-size:9px;letter-spacing:.06em;white-space:nowrap}.leave-button{min-height:26px;padding:0 7px;font-size:9px}.timer-box{min-width:76px;padding:6px 7px}.timer-value{font-size:27px}.timer-value.game{font-size:17px}.timer-label{font-size:8px}.accepted-alert{font-size:11px;margin-top:6px;padding:8px}.layout{grid-template-columns:1fr;gap:8px}.panel.side{display:none}.mobile-loadout{display:none}.search-wrap{grid-template-columns:1fr 54px;position:sticky;top:95px;z-index:8;background:rgba(3,7,13,.96);padding:7px 0 8px;margin-bottom:6px}.champion-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.champion{min-height:116px}.portrait{height:86px}.champion-name{font-size:10px;padding:7px 6px}.champion-actions{display:none}.spell-grid{grid-template-columns:1fr 1fr}.mobile-action-bar{position:fixed;left:0;right:0;bottom:0;z-index:35;display:grid;grid-template-columns:1fr;gap:8px;padding:10px 10px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:linear-gradient(180deg,rgba(5,11,19,.94),rgba(3,7,13,.99));box-shadow:0 -18px 45px rgba(0,0,0,.55);backdrop-filter:blur(12px)}.mobile-selected{display:grid;grid-template-columns:42px minmax(0,1fr);gap:9px;align-items:center;min-height:42px}.mobile-selected img{width:42px;height:42px;object-fit:cover;border:1px solid rgba(200,170,110,.5);background:#061019}.mobile-selected strong{display:block;font:900 13px system-ui,sans-serif;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mobile-selected span{display:block;margin-top:2px;font:800 9px system-ui,sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}.mobile-action-buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.mobile-action-buttons button{min-height:42px;font-size:11px}.toast{bottom:112px} }""")
          rep("""  <div id=\"toast\" class=\"toast\"></div>""", """  <div id=\"mobileActionBar\" class=\"mobile-action-bar\"><div class=\"mobile-selected\"><img id=\"mobileSelectedImage\" alt=\"\"><div><strong id=\"mobileSelectedName\">Select champion</strong><span id=\"mobileSelectedHint\">Tap a champion above</span></div></div><div class=\"mobile-action-buttons\"><button id=\"mobileHoverButton\" class=\"hover\" disabled>Hover</button><button id=\"mobileBanButton\" class=\"ban\" disabled>Ban</button><button id=\"mobilePickButton\" class=\"lock\" disabled>Pick</button></div></div>
  <div id=\"toast\" class=\"toast\"></div>""")
          rep("""let state=null, previousPhase=null, query='', timerBaseMs=null, timerBasePerf=0, timerInfinite=false, timerKey='', lastVisibleSecond=null, timerRequestId=0;""", """let state=null, previousPhase=null, query='', timerBaseMs=null, timerBasePerf=0, timerInfinite=false, timerKey='', lastVisibleSecond=null, timerRequestId=0, selectedChampionId=0;""")
          rep("""const championsEl=document.getElementById('champions'), allyPickedListEl=document.getElementById('allyPickedList'), enemyPickedListEl=document.getElementById('enemyPickedList'), phaseEl=document.getElementById('phase'), messageEl=document.getElementById('message'), turnEl=document.getElementById('turn'), gameStatusEl=document.getElementById('gameStatus'), timerEl=document.getElementById('timer'), timerLabelEl=document.getElementById('timerLabel'), acceptedAlertEl=document.getElementById('acceptedAlert'), searchEl=document.getElementById('search'), countEl=document.getElementById('count'), toastEl=document.getElementById('toast'), desktopLoadoutEl=document.getElementById('desktopLoadout'), mobileLoadoutEl=document.getElementById('mobileLoadout'), spellModalEl=document.getElementById('spellModal'), spellGridEl=document.getElementById('spellGrid'), spellModalTitleEl=document.getElementById('spellModalTitle'), leaveButtonEl=document.getElementById('leaveButton');""", """const championsEl=document.getElementById('champions'), allyPickedListEl=document.getElementById('allyPickedList'), enemyPickedListEl=document.getElementById('enemyPickedList'), phaseEl=document.getElementById('phase'), messageEl=document.getElementById('message'), turnEl=document.getElementById('turn'), gameStatusEl=document.getElementById('gameStatus'), timerEl=document.getElementById('timer'), timerLabelEl=document.getElementById('timerLabel'), acceptedAlertEl=document.getElementById('acceptedAlert'), searchEl=document.getElementById('search'), countEl=document.getElementById('count'), toastEl=document.getElementById('toast'), desktopLoadoutEl=document.getElementById('desktopLoadout'), mobileLoadoutEl=document.getElementById('mobileLoadout'), spellModalEl=document.getElementById('spellModal'), spellGridEl=document.getElementById('spellGrid'), spellModalTitleEl=document.getElementById('spellModalTitle'), leaveButtonEl=document.getElementById('leaveButton'), mobileSelectedImageEl=document.getElementById('mobileSelectedImage'), mobileSelectedNameEl=document.getElementById('mobileSelectedName'), mobileSelectedHintEl=document.getElementById('mobileSelectedHint'), mobileHoverButtonEl=document.getElementById('mobileHoverButton'), mobileBanButtonEl=document.getElementById('mobileBanButton'), mobilePickButtonEl=document.getElementById('mobilePickButton');""")
          rep("""document.getElementById('closeSpellModal').onclick=closeSpellModal; spellModalEl.addEventListener('click',e=>{if(e.target===spellModalEl)closeSpellModal();}); leaveButtonEl.onclick=leaveLobby;""", """document.getElementById('closeSpellModal').onclick=closeSpellModal; spellModalEl.addEventListener('click',e=>{if(e.target===spellModalEl)closeSpellModal();}); leaveButtonEl.onclick=leaveLobby; mobileHoverButtonEl.onclick=()=>{const c=getSelectedChampion();if(c)hoverChampion(c.id,c.name);}; mobileBanButtonEl.onclick=()=>{const c=getSelectedChampion();if(c)banChampion(c.id,c.name);}; mobilePickButtonEl.onclick=()=>{const c=getSelectedChampion();if(c)pickChampion(c.id,c.name);};""")
          rep("""function renderAll(){if(!state)return;updateStatusOnly();renderLoadout(desktopLoadoutEl);renderLoadout(mobileLoadoutEl);renderChampionGrid();const picked=state.champions||[];renderRail(allyPickedListEl,picked.filter(c=>c.isPicked&&(c.teamSide==='ally'||!c.teamSide)),'Ally Pick');renderRail(enemyPickedListEl,picked.filter(c=>c.isPicked&&c.teamSide==='enemy'),'Enemy Pick');}""", """function renderAll(){if(!state)return;updateStatusOnly();renderLoadout(desktopLoadoutEl);renderLoadout(mobileLoadoutEl);renderChampionGrid();renderMobileActionBar();const picked=state.champions||[];renderRail(allyPickedListEl,picked.filter(c=>c.isPicked&&(c.teamSide==='ally'||!c.teamSide)),'Ally Pick');renderRail(enemyPickedListEl,picked.filter(c=>c.isPicked&&c.teamSide==='enemy'),'Enemy Pick');}""")
          rep("""function renderChampionGrid(){if(!state)return;const champions=state.champions||[];const filtered=champions.filter(c=>c.name.toLowerCase().includes(query));const canPick=state.canPick||(state.isMyTurn&&state.actionType==='pick');const canBan=state.canBan||(state.isMyTurn&&state.actionType==='ban');countEl.textContent=filtered.length;championsEl.innerHTML='';for(const c of filtered){const disabled=c.isDisabled;const badge=c.isBanned?'<span class=\"badge banned\">Banned</span>':c.isPicked?'<span class=\"badge\">Picked</span>':c.isIntent?'<span class=\"badge intent\">Intent</span>':c.isSelected?'<span class=\"badge\">Selected</span>':'';const card=document.createElement('article');card.className='champion '+(disabled?'disabled':'available');card.innerHTML=`<div class=\"portrait\">${badge}<img src=\"${escapeAttr(c.imageUrl)}\" alt=\"\"></div><div class=\"champion-name\">${escapeHtml(c.name)}</div><div class=\"champion-actions\"><button class=\"hover\" ${disabled||!state.isInChampSelect?'disabled':''}>Hover</button><button class=\"${canBan?'ban':'lock'}\" ${disabled||(!canPick&&!canBan)?'disabled':''}>${canBan?'Ban':'Lock'}</button></div>`;card.querySelector('.hover').onclick=()=>hoverChampion(c.id,c.name);card.querySelector('.lock, .ban').onclick=()=>canBan?banChampion(c.id,c.name):pickChampion(c.id,c.name);championsEl.appendChild(card);}}""", """function renderChampionGrid(){if(!state)return;const champions=state.champions||[];const filtered=champions.filter(c=>c.name.toLowerCase().includes(query));const canPick=state.canPick||(state.isMyTurn&&state.actionType==='pick');const canBan=state.canBan||(state.isMyTurn&&state.actionType==='ban');countEl.textContent=filtered.length;championsEl.innerHTML='';for(const c of filtered){const disabled=c.isDisabled;const badge=c.isBanned?'<span class=\"badge banned\">Banned</span>':c.isPicked?'<span class=\"badge\">Picked</span>':c.isIntent?'<span class=\"badge intent\">Intent</span>':c.isSelected?'<span class=\"badge\">Selected</span>':'';const card=document.createElement('article');card.className='champion '+(disabled?'disabled':'available')+(selectedChampionId===c.id?' selected-card':'');card.innerHTML=`<div class=\"portrait\">${badge}<img src=\"${escapeAttr(c.imageUrl)}\" alt=\"\"></div><div class=\"champion-name\">${escapeHtml(c.name)}</div><div class=\"champion-actions\"><button class=\"hover\" ${disabled||!state.isInChampSelect?'disabled':''}>Hover</button><button class=\"${canBan?'ban':'lock'}\" ${disabled||(!canPick&&!canBan)?'disabled':''}>${canBan?'Ban':'Lock'}</button></div>`;card.onclick=e=>{if(e.target.tagName==='BUTTON')return;selectChampionForMobile(c.id);};card.querySelector('.hover').onclick=()=>hoverChampion(c.id,c.name);card.querySelector('.lock, .ban').onclick=()=>canBan?banChampion(c.id,c.name):pickChampion(c.id,c.name);championsEl.appendChild(card);}}""")
          rep("""function renderLoadout(target){if(!target||!state)return;""", """function selectChampionForMobile(id){selectedChampionId=id;renderChampionGrid();renderMobileActionBar();}
function getSelectedChampion(){if(!state||!selectedChampionId)return null;return (state.champions||[]).find(c=>c.id===selectedChampionId)||null;}
function renderMobileActionBar(){const c=getSelectedChampion();const canPick=state&&(state.canPick||(state.isMyTurn&&state.actionType==='pick'));const canBan=state&&(state.canBan||(state.isMyTurn&&state.actionType==='ban'));if(!c){mobileSelectedImageEl.removeAttribute('src');mobileSelectedNameEl.textContent='Select champion';mobileSelectedHintEl.textContent='Tap a champion above';mobileHoverButtonEl.disabled=true;mobileBanButtonEl.disabled=true;mobilePickButtonEl.disabled=true;return;}mobileSelectedImageEl.src=c.imageUrl||'';mobileSelectedNameEl.textContent=c.name||'Champion';mobileSelectedHintEl.textContent=c.isBanned?'Banned':c.isPicked?'Already picked':c.isIntent?'Intent selected':c.isSelected?'Selected':'Ready';mobileHoverButtonEl.disabled=c.isDisabled||!state.isInChampSelect;mobileBanButtonEl.disabled=c.isDisabled||!canBan;mobilePickButtonEl.disabled=c.isDisabled||!canPick;}
function renderLoadout(target){if(!target||!state)return;""")
          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/patch-mobile-remote-pick-once.yml').unlink(missing_ok=True)

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if git diff --quiet && git diff --cached --quiet; then echo "No changes to commit."; exit 0; fi
          git add RiotAutoLogin/Services/RemotePickPageHtml.cs .github/workflows/patch-mobile-remote-pick-once.yml
          git commit -m "Improve Remote Pick mobile action layout"
          git pull --rebase origin master
          git push origin HEAD:master

name: Patch greyscreen time once

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Patch greyscreen time formatting
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8-sig')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old[:160]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace('RiotAutoLogin/Models/Account.cs',
                  '        public int Greyscreens { get; set; }\n        public string GreyscreensLastUpdatedUtc { get; set; } = string.Empty;',
                  '        public int Greyscreens { get; set; }\n        public long GreyscreenSeconds { get; set; }\n        public string GreyscreensLastUpdatedUtc { get; set; } = string.Empty;')

          replace('RiotAutoLogin/Services/AccountService.cs',
                  '        public static (int totalGames, int totalWins, int totalLosses, double winRate, int totalGreyscreens) CalculateStats(List<Account> accounts)\n        {\n            int totalGames = accounts.Sum(a => a.Wins + a.Losses);\n            int totalWins = accounts.Sum(a => a.Wins);\n            int totalLosses = accounts.Sum(a => a.Losses);\n            int totalGreyscreens = accounts.Sum(a => a.Greyscreens);\n            double winRate = totalGames > 0 ? (double)totalWins / totalGames * 100 : 0;\n\n            return (totalGames, totalWins, totalLosses, winRate, totalGreyscreens);\n        }',
                  '        public static (int totalGames, int totalWins, int totalLosses, double winRate, int totalGreyscreens, long totalGreyscreenSeconds) CalculateStats(List<Account> accounts)\n        {\n            int totalGames = accounts.Sum(a => a.Wins + a.Losses);\n            int totalWins = accounts.Sum(a => a.Wins);\n            int totalLosses = accounts.Sum(a => a.Losses);\n            int totalGreyscreens = accounts.Sum(a => a.Greyscreens);\n            long totalGreyscreenSeconds = accounts.Sum(a => a.GreyscreenSeconds);\n            double winRate = totalGames > 0 ? (double)totalWins / totalGames * 100 : 0;\n\n            return (totalGames, totalWins, totalLosses, winRate, totalGreyscreens, totalGreyscreenSeconds);\n        }')

          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '        public int Greyscreens { get; set; }\n        public string Source { get; set; } = string.Empty;',
                  '        public int Greyscreens { get; set; }\n        public long GreyscreenSeconds { get; set; }\n        public string Source { get; set; } = string.Empty;')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '            if (TryReadMatchHistoryDeaths(summoner.puuid, summoner.accountId, summoner.summonerId, out int deaths, out string source))',
                  '            if (TryReadMatchHistoryStats(summoner.puuid, summoner.accountId, summoner.summonerId, out int deaths, out long deadSeconds, out string source))')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '                    Greyscreens = deaths,\n                    Source = source,\n                    Message = $"Synced {deaths} greyscreens from LCU match history."',
                  '                    Greyscreens = deaths,\n                    GreyscreenSeconds = deadSeconds,\n                    Source = source,\n                    Message = deadSeconds > 0 ? $"Synced {FormatDuration(deadSeconds)} greyscreen time from LCU match history ({deaths} deaths)." : $"Synced {deaths} greyscreens from LCU match history."')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '        private static bool TryReadMatchHistoryDeaths(string puuid, string accountId, string summonerId, out int deaths, out string source)\n        {',
                  '        private static bool TryReadMatchHistoryStats(string puuid, string accountId, string summonerId, out int deaths, out long deadSeconds, out string source)\n        {')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '                deaths = 0;\n                return false;',
                  '                deaths = 0;\n                deadSeconds = 0;\n                return false;')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '                return TrySumDeathsForCurrentPlayer(doc.RootElement, puuid, accountId, summonerId, out deaths);',
                  '                return TrySumStatsForCurrentPlayer(doc.RootElement, puuid, accountId, summonerId, out deaths, out deadSeconds);')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '                deaths = 0;\n                return false;\n            }\n        }\n\n        private static bool TrySumDeathsForCurrentPlayer(JsonElement root, string puuid, string accountId, string summonerId, out int totalDeaths)',
                  '                deaths = 0;\n                deadSeconds = 0;\n                return false;\n            }\n        }\n\n        private static bool TrySumStatsForCurrentPlayer(JsonElement root, string puuid, string accountId, string summonerId, out int totalDeaths, out long totalDeadSeconds)')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '            totalDeaths = 0;\n\n            if (!TryFindGamesArray(root, out JsonElement games))',
                  '            totalDeaths = 0;\n            totalDeadSeconds = 0;\n\n            if (!TryFindGamesArray(root, out JsonElement games))')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '                if (TryFindParticipantStats(game, participantId, out JsonElement stats) && TryReadDeaths(stats, out int deaths))\n                {\n                    foundCurrentPlayerInAnyGame = true;\n                    totalDeaths += deaths;\n                }',
                  '                if (TryFindParticipantStats(game, participantId, out JsonElement stats))\n                {\n                    foundCurrentPlayerInAnyGame = true;\n                    if (TryReadDeaths(stats, out int deaths))\n                        totalDeaths += deaths;\n                    if (TryReadDeadSeconds(stats, out long seconds))\n                        totalDeadSeconds += seconds;\n                }')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '        private static bool TryFindProperty(JsonElement element, string propertyName, out JsonElement value)',
                  '        private static bool TryReadDeadSeconds(JsonElement stats, out long seconds)\n        {\n            foreach (string propertyName in new[] { "totalTimeSpentDead", "timeSpentDead", "totalTimeDead", "deadTime" })\n            {\n                if (TryFindProperty(stats, propertyName, out JsonElement value) && TryGetLong(value, out seconds))\n                    return true;\n            }\n\n            seconds = 0;\n            return false;\n        }\n\n        private static string FormatDuration(long seconds)\n        {\n            if (seconds < 60)\n                return $"{seconds}s";\n\n            long minutes = seconds / 60;\n            if (minutes < 120)\n                return $"{minutes} min";\n\n            double hours = seconds / 3600.0;\n            if (hours < 48)\n                return $"{hours:F1} h";\n\n            double days = seconds / 86400.0;\n            return $"{days:F1} d";\n        }\n\n        private static bool TryFindProperty(JsonElement element, string propertyName, out JsonElement value)')
          replace('RiotAutoLogin/Services/LcuGreyscreenStatsService.cs',
                  '        private static string GetString(JsonElement element, params string[] propertyNames)',
                  '        private static bool TryGetLong(JsonElement element, out long value)\n        {\n            if (element.ValueKind == JsonValueKind.Number)\n                return element.TryGetInt64(out value);\n            if (element.ValueKind == JsonValueKind.String)\n                return long.TryParse(element.GetString(), out value);\n\n            value = 0;\n            return false;\n        }\n\n        private static string GetString(JsonElement element, params string[] propertyNames)')

          replace('RiotAutoLogin/Services/UIService.cs',
                  '            var (totalGames, totalWins, totalLosses, winRate, totalGreyscreens) = AccountService.CalculateStats(accounts);',
                  '            var (totalGames, totalWins, totalLosses, winRate, totalGreyscreens, totalGreyscreenSeconds) = AccountService.CalculateStats(accounts);')
          replace('RiotAutoLogin/Services/UIService.cs',
                  '                txtStatsGreyscreensValue.Text = totalGreyscreens.ToString();',
                  '                txtStatsGreyscreensValue.Text = totalGreyscreenSeconds > 0 ? FormatGreyscreenDuration(totalGreyscreenSeconds) : totalGreyscreens.ToString();')
          replace('RiotAutoLogin/Services/UIService.cs',
                  '                txtTotalGames.Text = $"Total Games: {totalGames} | Wins: {totalWins} | Losses: {totalLosses} | Win Rate: {winRate:F1}% | Greyscreens: {totalGreyscreens}";',
                  '                txtTotalGames.Text = $"Total Games: {totalGames} | Wins: {totalWins} | Losses: {totalLosses} | Win Rate: {winRate:F1}% | Greyscreen Time: {FormatGreyscreenDuration(totalGreyscreenSeconds)} | Deaths: {totalGreyscreens}";')
          replace('RiotAutoLogin/Services/UIService.cs',
                  '                            Text = "Greyscreens",',
                  '                            Text = "Greyscreen Time",')
          replace('RiotAutoLogin/Services/UIService.cs',
                  '                account.Greyscreens = result.Greyscreens;\n                account.GreyscreensLastUpdatedUtc = DateTime.UtcNow.ToString("O");',
                  '                account.Greyscreens = result.Greyscreens;\n                account.GreyscreenSeconds = result.GreyscreenSeconds;\n                account.GreyscreensLastUpdatedUtc = DateTime.UtcNow.ToString("O");')
          replace('RiotAutoLogin/Services/UIService.cs',
                  '                MessageBox.Show($"Saved {result.Greyscreens} greyscreens for {savedRiotId}.\\nSource: {result.Source}", "Greyscreen Sync", MessageBoxButton.OK, MessageBoxImage.Information);',
                  '                string formattedTime = FormatGreyscreenDuration(result.GreyscreenSeconds);\n                MessageBox.Show($"Saved greyscreen time for {savedRiotId}: {formattedTime} ({result.Greyscreens} deaths).\\nSource: {result.Source}", "Greyscreen Sync", MessageBoxButton.OK, MessageBoxImage.Information);')
          replace('RiotAutoLogin/Services/UIService.cs',
                  '        private static Models.Account? FindSavedAccountForGreyscreenSync',
                  '        private static string FormatGreyscreenDuration(long seconds)\n        {\n            if (seconds <= 0)\n                return "0 min";\n\n            if (seconds < 60)\n                return $"{seconds}s";\n\n            long minutes = seconds / 60;\n            if (minutes < 120)\n                return $"{minutes} min";\n\n            double hours = seconds / 3600.0;\n            if (hours < 48)\n                return $"{hours:F1} h";\n\n            double days = seconds / 86400.0;\n            return $"{days:F1} d";\n        }\n\n        private static Models.Account? FindSavedAccountForGreyscreenSync')

          Path('.github/workflows/patch-greyscreen-time-once.yml').unlink(missing_ok=True)

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if git diff --quiet && git diff --cached --quiet; then echo "No changes to commit."; exit 0; fi
          git add RiotAutoLogin/Models/Account.cs RiotAutoLogin/Services/AccountService.cs RiotAutoLogin/Services/LcuGreyscreenStatsService.cs RiotAutoLogin/Services/UIService.cs .github/workflows/patch-greyscreen-time-once.yml
          git commit -m "Display greyscreen time as duration"
          git pull --rebase origin master
          git push origin HEAD:master

name: Fix Remote Pick timer once

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Patch RemotePickServerService timer
        shell: python
        run: |
          from pathlib import Path

          path = Path('RiotAutoLogin/Services/RemotePickServerService.cs')
          workflow_path = Path('.github/workflows/fix-remote-pick-timer-once.yml')

          text = path.read_text(encoding='utf-8-sig')
          original = text

          text = text.replace(
              'TryLoadQueueFromGameflowOrLobby(state);\n            TryReadLiveGameState(state);',
              'TryLoadQueueFromGameflowOrLobby(state);\n\n            if (state.Phase == "GameStart" || state.Phase == "InProgress")\n                TryReadLiveGameState(state);',
              1,
          )

          text = text.replace(
              '            if (TryReadLiveGameStats("https://127.0.0.1:2999/liveclientdata/gamestats", state))\n                return;\n\n            TryReadLiveGameStats("http://127.0.0.1:2999/liveclientdata/gamestats", state);',
              '            if (!state.IsGameClientRunning)\n                return;\n\n            TryReadLiveGameStats("https://127.0.0.1:2999/liveclientdata/gamestats", state);',
              1,
          )

          if text != original:
              path.write_text(text, encoding='utf-8')
              print('Patched RemotePickServerService.cs')
          else:
              print('RemotePickServerService.cs was already patched or patterns were not found')

          workflow_path.unlink(missing_ok=True)
          print('Removed one-time workflow file')

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add RiotAutoLogin/Services/RemotePickServerService.cs .github/workflows/fix-remote-pick-timer-once.yml
          git commit -m "Fix Remote Pick timer Live Client polling"
          git pull --rebase origin master
          git push origin HEAD:master

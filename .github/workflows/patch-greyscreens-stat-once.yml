name: Patch greyscreens UI once

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Patch greyscreens UI
        shell: python
        run: |
          from pathlib import Path

          xaml_path = Path('RiotAutoLogin/MainWindow.xaml')
          xaml = xaml_path.read_text(encoding='utf-8-sig')
          xaml = xaml.replace('''                                            <ColumnDefinition Width="*"/>
                                            <ColumnDefinition Width="*"/>
                                            <ColumnDefinition Width="*"/>
                                            <ColumnDefinition Width="*"/>
                                            <ColumnDefinition Width="Auto"/>''', '''                                            <ColumnDefinition Width="*"/>
                                            <ColumnDefinition Width="*"/>
                                            <ColumnDefinition Width="*"/>
                                            <ColumnDefinition Width="*"/>
                                            <ColumnDefinition Width="*"/>
                                            <ColumnDefinition Width="Auto"/>
                                            <ColumnDefinition Width="Auto"/>''', 1)
          xaml = xaml.replace('''                                        <Button Grid.Column="4"
                x:Name="btnRefreshQuickStats"''', '''                                        <Border Grid.Column="4"
                Background="#141B24"
                CornerRadius="14"
                Padding="14"
                Margin="0,0,10,0">
                                            <StackPanel>
                                                <TextBlock Text="Greyscreens"
                           FontSize="11"
                           Opacity="0.65"
                           Foreground="{StaticResource TextColorBrush}"/>
                                                <TextBlock x:Name="txtStatsGreyscreensValue"
                           Text="0"
                           Margin="0,4,0,0"
                           FontSize="20"
                           FontWeight="SemiBold"
                           Foreground="#B66DFF"/>
                                            </StackPanel>
                                        </Border>

                                        <Button Grid.Column="5"
                x:Name="btnRefreshQuickStats"''', 1)
          xaml = xaml.replace('''                                        </Button>
                                    </Grid>''', '''                                        </Button>

                                        <Button Grid.Column="6"
                x:Name="btnRefreshGreyscreens"
                Style="{StaticResource GhostIconButton}"
                Click="btnRefreshGreyscreens_Click"
                ToolTip="Sync greyscreens from the currently logged League account"
                VerticalAlignment="Stretch"
                Margin="8,0,0,0">
                                            <TextBlock Text="☠"
                   FontSize="16"
                   Foreground="#C9B6FF"
                   HorizontalAlignment="Center"
                   VerticalAlignment="Center"/>
                                        </Button>
                                    </Grid>''', 1)
          xaml_path.write_text(xaml, encoding='utf-8')

          cs_path = Path('RiotAutoLogin/MainWindow.xaml.cs')
          cs = cs_path.read_text(encoding='utf-8-sig')
          cs = cs.replace('''        private void UpdateQuickLoginViewport()
        {''', '''        private async void btnRefreshGreyscreens_Click(object sender, RoutedEventArgs e)
        {
            btnRefreshGreyscreens.IsEnabled = false;

            try
            {
                LcuGreyscreenStatsResult result = await LcuGreyscreenStatsService.GetCurrentAccountGreyscreensAsync();
                if (!result.Success)
                {
                    System.Windows.MessageBox.Show(result.Message, "Greyscreen Sync", MessageBoxButton.OK, MessageBoxImage.Warning);
                    return;
                }

                Account? account = FindSavedAccountForGreyscreenSync(result);
                if (account == null)
                {
                    string riotId = string.IsNullOrWhiteSpace(result.TagLine) ? result.GameName : $"{result.GameName}#{result.TagLine}";
                    System.Windows.MessageBox.Show($"Synced {result.Greyscreens} greyscreens for {riotId}, but no matching saved account was found.", "Greyscreen Sync", MessageBoxButton.OK, MessageBoxImage.Warning);
                    return;
                }

                account.Greyscreens = result.Greyscreens;
                account.GreyscreensLastUpdatedUtc = DateTime.UtcNow.ToString("O");

                RefreshAccountLists();
                UpdateQuickLoginViewport();
                UpdateTotalGameStats();
                SaveAccounts();

                string savedRiotId = string.IsNullOrWhiteSpace(account.TagLine) ? account.GameName : $"{account.GameName}#{account.TagLine}";
                System.Windows.MessageBox.Show($"Saved {result.Greyscreens} greyscreens for {savedRiotId}.\\nSource: {result.Source}", "Greyscreen Sync", MessageBoxButton.OK, MessageBoxImage.Information);
            }
            finally
            {
                btnRefreshGreyscreens.IsEnabled = true;
            }
        }

        private Account? FindSavedAccountForGreyscreenSync(LcuGreyscreenStatsResult result)
        {
            string gameName = NormalizeRiotIdPart(result.GameName);
            string tagLine = NormalizeRiotIdPart(result.TagLine);

            Account? exact = _accounts.FirstOrDefault(account =>
                NormalizeRiotIdPart(account.GameName) == gameName &&
                (string.IsNullOrEmpty(tagLine) || NormalizeRiotIdPart(account.TagLine) == tagLine));

            if (exact != null)
                return exact;

            return _accounts.FirstOrDefault(account => NormalizeRiotIdPart(account.GameName) == gameName);
        }

        private static string NormalizeRiotIdPart(string value)
        {
            return (value ?? string.Empty).Trim().ToLowerInvariant();
        }

        private void UpdateQuickLoginViewport()
        {''', 1)
          cs_path.write_text(cs, encoding='utf-8')

          Path('.github/workflows/patch-greyscreens-stat-once.yml').unlink(missing_ok=True)
          Path('.github/greyscreens-stat-run.txt').unlink(missing_ok=True)

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if git diff --quiet && git diff --cached --quiet; then echo "No changes to commit."; exit 0; fi
          git add RiotAutoLogin/MainWindow.xaml RiotAutoLogin/MainWindow.xaml.cs .github/workflows/patch-greyscreens-stat-once.yml .github/greyscreens-stat-run.txt
          git commit -m "Add greyscreens sync UI"
          git pull --rebase origin master
          git push origin HEAD:master
